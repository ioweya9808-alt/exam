<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>模擬考第一天</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin:0; padding:0; background:#000; color:#fff; height:100%; overflow:hidden; }
    body { font-family: "Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,sans-serif; }
    #viewport { position:relative; width:100vw; height:100vh; }
    #stage-wrap { position:absolute; left:0; top:0; width:1920px; height:1080px; transform-origin: top left; }
    #stage { position:absolute; inset:0; display:grid; grid-template-columns: 780px 1140px; }
    .left { padding: 60px 60px 40px 60px; display:grid; grid-template-rows: auto auto 1fr; }
    .right { padding: 60px 60px 40px 40px; display:grid; grid-template-rows: auto auto 1fr auto; row-gap: 24px; }
    .divider { position:absolute; left:780px; top:60px; bottom:60px; width:2px; background:#89a8ff; box-shadow:0 0 2px #89a8ff; }
    .date-line { font-size: 48px; letter-spacing: 0.08em; }
    .title { font-size: 54px; letter-spacing: 0.08em; margin: 24px 0 12px; }
    .schedule { list-style:none; padding:0; margin:0; height:100%; display:flex; flex-direction:column; justify-content:space-between; }
    .schedule li { font-size: 54px; line-height: 1.45; display:flex; align-items:center; justify-content:space-between; gap: 40px; padding: 4px 8px; border-radius: 8px; margin: 0; transition: background-color .2s, color .2s; }
    .time { color:#e5e7eb; }
    .subject { color:#fff; }
    .subject[contenteditable="true"] { border-bottom: 1px dashed rgba(255,255,255,.25); }
    .subject[contenteditable="true"]:focus { outline: 2px solid #60a5fa; background: rgba(96,165,250,.08); }
    .schedule li.current { background:#EAFA50; }
    .schedule li.current .time, .schedule li.current .subject { color:#EC4E1C; }
    .top-row { display:flex; align-items:center; justify-content:space-between; gap:24px; }
    .top-row h2 { font-size: 36px; margin:0; letter-spacing:0.08em; white-space:nowrap; }
    #timeDisplay { width: 600px; height: 120px; display:flex; align-items:center; justify-content:center; border-radius: 12px; border: 1px solid #2b3b69; font-feature-settings:"tnum"; font-variant-numeric: tabular-nums; font-size: 80px; font-weight: 800; letter-spacing: 0.06em; background:#111827; color:#fff; }
    .notes-line { font-size: 48px; color:#f0f0f0; display:flex; gap:60px; flex-wrap:wrap; margin-top: 12px; }
    .table-wrap { align-self: start; }
    table { width: 100%; border-collapse: collapse; }
    thead th { background: #3a66b3; color:#fff; font-size: 32px; padding: 16px 0; border: 1px solid #cbd5e1; text-align:center; }
    tbody td { font-size: 32px; padding: 12px 0; text-align: center; border: 1px solid #3a4660; background: rgba(255,255,255,.06); min-width: 120px; }
    tbody tr:nth-child(even) td { background: rgba(255,255,255,.12); }
    td[contenteditable="true"]:focus { outline: 2px solid #60a5fa; background: rgba(96,165,250,.2); }
    .footer { font-size: 20px; }
    .footer .row { margin-top: 14px; display:flex; gap: 24px; align-items:center; flex-wrap: nowrap; }
    .footer input { font-size: 36px; line-height: 1.3; color:#fff; background: transparent; border: 1px solid rgba(255,255,255,.35); border-radius: 10px; padding: 10px 14px; }
    #candidateCount { width:220px; }
    .footer .absent-label, .footer .note-label { white-space:nowrap; }
    #absentInput { flex: 1 1 auto; min-width: 0; max-width: 100%; }
    #noteInput { flex: 1 1 auto; min-width: 0; max-width: 100%; }
    .float-controls { position: fixed; right: 20px; bottom: 20px; display: flex; gap: 10px; align-items: center; z-index: 9999; background: rgba(17,24,39,.7); border: 1px solid #2b3b69; border-radius: 12px; padding: 8px 10px; backdrop-filter: blur(4px); }
    .fc-btn { display:inline-flex; align-items:center; justify-content:center; width: 44px; height: 44px; border-radius: 10px; color:#fff; background:#111827; border:1px solid #2b3b69; cursor:pointer; user-select:none; }
    .fc-btn:hover { background:#1f2937; }
    .fc-label { font-size:14px; color:#cbd5e1; padding:0 6px; min-width:52px; text-align:right; }
    .icon { width:22px; height:22px; fill:none; stroke:currentColor; stroke-width:2; }
    @media print { .float-controls { display:none; } }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="stage-wrap">
      <div id="stage">
        <div class="divider" aria-hidden="true"></div>

        <!-- 左欄 -->
        <section class="left">
          <div class="date-line" id="dateText">—月—日 星期—</div>
          <div class="title">考試時段及科目</div>
          <ul class="schedule">
            <li id="slot1"><span class="time">8:00–9:10</span><span class="subject" id="self1" contenteditable="true">社會</span></li>
            <li id="slot2"><span class="time">9:20–10:40</span><span class="subject" id="sub1" contenteditable="true">數學</span></li>
            <li id="slot3"><span class="time">10:50–12:00</span><span class="subject" id="self2" contenteditable="true">國文</span></li>
            <li id="slot4"><span class="time">13:15–14:05</span><span class="subject" id="sub2" contenteditable="true">作文</span></li>
          </ul>
        </section>

        <!-- 右欄 -->
        <section class="right">
          <div class="top-row" id="timeRow" style="display:none;">
            <h2>注意時間掌控</h2>
            <div id="timeDisplay" aria-live="polite"></div>
          </div>

          <div class="notes-line">
            <span>手機、智慧手錶置入手機箱</span>
            <span>考試時，桌面只留文具</span>
          </div>

          <div class="table-wrap">
            <div style="display:flex; justify-content:flex-end; margin:6px 0 8px;">
              <button id="btnResetSeats" style="font-size:18px; padding:6px 10px; border-radius:8px; background:#111827; color:#fff; border:1px solid #2b3b69; cursor:pointer;">
                ↻ 重置座位（載入預設）
              </button>
            </div>
            <table id="seatTable">
              <thead><tr><th colspan="6">座位表</th></tr></thead>
              <tbody id="seatBody"></tbody>
            </table>
          </div>

          <div class="footer">
            <div class="row">
              <span>應考人數：</span>
              <input type="number" id="candidateCount" min="0" placeholder="人" />
              <span class="absent-label">缺考：</span>
              <input type="text" id="absentInput" placeholder="例如：35號王小明" />
            </div>
            <div class="row">
              <span class="note-label">備註：</span>
              <input type="text" id="noteInput" placeholder="：A-201" />
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div class="float-controls" role="group" aria-label="視窗控制">
    <button class="fc-btn" id="btnFS" aria-pressed="false" aria-label="全螢幕">
      <svg class="icon" id="iconEnter" viewBox="0 0 24 24"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>
      <svg class="icon" id="iconExit" viewBox="0 0 24 24" style="display:none;"><path d="M9 3H3v6M15 3h6v6M9 21H3v-6M15 21h6v-6"/></svg>
    </button>
    <button class="fc-btn" id="btnZoomOut" aria-label="縮小">–</button>
    <span class="fc-label" id="zoomLabel">100%</span>
    <button class="fc-btn" id="btnZoomIn" aria-label="放大">＋</button>
  </div>

  <script>
    /* ===== 版面縮放 ===== */
    let userZoom = 1.0;
    const ZOOM_STEP = 0.1, MIN_ZOOM = 0.6, MAX_ZOOM = 2.0;
    function scaleStage(){
      const vw = window.innerWidth, vh = window.innerHeight;
      const sw = 1920, sh = 1080;
      let baseScale = vh / sh;
      if (sw * baseScale > vw) baseScale = Math.min(vw/sw, vh/sh);
      const finalScale = baseScale * userZoom;
      const wrap = document.getElementById("stage-wrap");
      const tx = (vw - sw*finalScale)/2, ty = (vh - sh*finalScale)/2;
      wrap.style.transform = `translate(${tx}px, ${ty}px) scale(${finalScale})`;
      document.getElementById("zoomLabel").textContent = `${Math.round(userZoom*100)}%`;
    }
    window.addEventListener("resize", scaleStage);
    window.addEventListener("orientationchange", scaleStage);
    scaleStage();

    /* ===== 日期 ===== */
    const weekdayNames = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
    function toYMD(date){
      const y = date.getFullYear(), m = String(date.getMonth()+1).padStart(2,"0"), d = String(date.getDate()).padStart(2,"0");
      return `${y}-${m}-${d}`;
    }
    function updateDate(){
      const now = new Date();
      const m = String(now.getMonth()+1).padStart(2,"0");
      const d = String(now.getDate()).padStart(2,"0");
      document.getElementById("dateText").textContent = `${m}月${d}日 ${weekdayNames[now.getDay()]}`;
    }
    updateDate();
    setInterval(updateDate, 60_000);

    /* ===== 注意時間掌控 ===== */
    function minutes(h,m){ return h*60 + m; }
    const DISPLAY_RANGES = [
      [minutes(6,30), minutes(7,59)],
      [minutes(9,10), minutes(9,19)],
      [minutes(10,40), minutes(10,49)],
      [minutes(12,0), minutes(13,14)]
    ];
    function inDisplayRanges(date){
      const t = date.getHours()*60 + date.getMinutes();
      return DISPLAY_RANGES.some(function(pair){ return t >= pair[0] && t <= pair[1]; });
    }
    function updateTimeRow(){
      const now = new Date();
      const row = document.getElementById("timeRow");
      const box = document.getElementById("timeDisplay");
      if(inDisplayRanges(now)){
        const hh = String(now.getHours()).padStart(2,"0");
        const mm = String(now.getMinutes()).padStart(2,"0");
        const ss = String(now.getSeconds()).padStart(2,"0");
        box.textContent = `${hh}:${mm}:${ss}`;
        row.style.display = "flex";
      } else {
        row.style.display = "none";
      }
    }
    updateTimeRow();
    setInterval(updateTimeRow, 1000);

    /* ===== 左側行程高亮 ===== */
    const SLOTS = [
      { id:"slot1", s:[8,0],  e:[9,10] },
      { id:"slot2", s:[9,20], e:[10,40] },
      { id:"slot3", s:[10,50],e:[12,0] },
      { id:"slot4", s:[13,15],e:[14,5] }
    ];
    function minutesSinceMidnight(h,m){ return h*60 + m; }
    function updateCurrentSlot(){
      const now = new Date();
      const cur = minutesSinceMidnight(now.getHours(), now.getMinutes());
      SLOTS.forEach(function(x){ document.getElementById(x.id).classList.remove("current"); });
      for(var i=0;i<SLOTS.length;i++){
        var x = SLOTS[i];
        var s = minutesSinceMidnight(x.s[0], x.s[1]);
        var e = minutesSinceMidnight(x.e[0], x.e[1]);
        if(cur >= s && cur <= e){
          document.getElementById(x.id).classList.add("current");
          break;
        }
      }
    }
    updateCurrentSlot();
    setInterval(updateCurrentSlot, 30_000);

    /* ===== LocalStorage 工具 ===== */
    function todayKey(part){ return part + ":" + toYMD(new Date()); }
    var LS = {
      get: function(k, fallback){
        try {
          var v = localStorage.getItem(k);
          return v===null ? fallback : JSON.parse(v);
        } catch(e) { return fallback; }
      },
      set: function(k, v){
        try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
      }
    };

    /* 可編輯科目（守門避免 null） */
    ["self1","sub1","self2","sub2","self3","sub3","essay"].forEach(function(id){
      var el = document.getElementById(id);
      if(!el) return;
      var saved = LS.get(todayKey("subject:"+id), null);
      if(saved!==null) el.textContent = saved;
      el.addEventListener("input", function(){ LS.set(todayKey("subject:"+id), el.textContent.trim()); });
    });

    /* 應考人數／缺考／備註（保存） */
    var candidateCount = document.getElementById("candidateCount");
    var absentInput = document.getElementById("absentInput");
    var noteInput = document.getElementById("noteInput");
    var savedCount = LS.get(todayKey("candidateCount"), "");
    var savedAbsent = LS.get(todayKey("absentList"), "");
    var savedNote = LS.get(todayKey("note"), "");
    if(savedCount!=="") candidateCount.value = savedCount;
    if(savedAbsent!=="") absentInput.value = savedAbsent;
    if(savedNote!=="") noteInput.value = savedNote;
    candidateCount.addEventListener("input", function(){ LS.set(todayKey("candidateCount"), candidateCount.value); });
    absentInput.addEventListener("input", function(){ LS.set(todayKey("absentList"), absentInput.value); });
    noteInput.addEventListener("input", function(){ LS.set(todayKey("note"), noteInput.value); });

    /* ===== 座位表 ===== */
    var seatBody = document.getElementById("seatBody");
    function defaultSeats(){
      return [
        ["27黃唯晴","22洪志丞","17吳劭祺","12葛乙涵","06高珞庭","01尤星雅"],
        ["29楊詠然","23高于凱","18李承宥","13劉芊蒂","07張瑜桐","02王奕晴"],
        ["30盧敬之","24張瑋丞","19林秉宸","14謝瑜恩","08陳唯萱","03王湘緹"],
        ["31魏威寧","25陳品叡","20林家鴻","15方東翰","09黃香菱","04姜德鈺"],
        ["32蘇御鈞","26曾以安","21林時任","16王楚皓","10黃彩育","缺席"]
      ];
    }
    function renderSeats(data){
      seatBody.innerHTML = "";
      for(var r=0;r<data.length;r++){
        var tr = document.createElement("tr");
        for(var c=0;c<data[r].length;c++){
          var td = document.createElement("td");
          td.textContent = data[r][c];
          td.contentEditable = "true";
          td.addEventListener("input", saveSeats);
          tr.appendChild(td);
        }
        seatBody.appendChild(tr);
      }
    }
    function readSeats(){
      var rows = seatBody.querySelectorAll("tr");
      var out = [];
      for(var i=0;i<rows.length;i++){
        var cells = rows[i].querySelectorAll("td");
        var arr = [];
        for(var j=0;j<cells.length;j++){
          arr.push((cells[j].textContent || "").trim());
        }
        out.push(arr);
      }
      return out;
    }
    function hasAnyContent(matrix){
      for(var i=0;i<matrix.length;i++){
        for(var j=0;j<matrix[i].length;j++){
          var cell = matrix[i][j];
          if(cell !== null && String(cell).trim() !== "") return true;
        }
      }
      return false;
    }
    function saveSeats(){ LS.set(todayKey("seats"), readSeats()); }
    function loadSeats(){
      try{
        var saved = LS.get(todayKey("seats"), null);
        var shapeOk = Array.isArray(saved)
          && saved.length === 5
          && saved.every(function(r){ return Array.isArray(r) && r.length === 6; });

        var okAndHas = shapeOk && hasAnyContent(saved || []);
        if(!okAndHas){
          saved = defaultSeats();
          LS.set(todayKey("seats"), saved);
        }
        renderSeats(saved);
      }catch(e){
        // 極端情況（localStorage 不可用等）：也要保證能顯示預設
        renderSeats(defaultSeats());
      }
    }
    loadSeats();

    document.getElementById("btnResetSeats") && document.getElementById("btnResetSeats").addEventListener("click", function(){
      var preset = defaultSeats();
      LS.set(todayKey("seats"), preset);
      renderSeats(preset);
    });

    /* ===== 全螢幕與縮放 ===== */
    var fsTarget = document.getElementById('viewport');
    var btnFS = document.getElementById('btnFS');
    var iconEnter = document.getElementById('iconEnter');
    var iconExit = document.getElementById('iconExit');
    var btnZoomIn = document.getElementById('btnZoomIn');
    var btnZoomOut = document.getElementById('btnZoomOut');

    function enterFullscreen(el){
      if(el.requestFullscreen) return el.requestFullscreen();
      if(el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
      if(el.msRequestFullscreen) return el.msRequestFullscreen();
    }
    function exitFullscreen(){
      if(document.exitFullscreen) return document.exitFullscreen();
      if(document.webkitExitFullscreen) return document.webkitExitFullscreen();
      if(document.msExitFullscreen) return document.msExitFullscreen();
    }
    function isFullscreen(){
      return !!(document.fullscreenElement
        || document.webkitFullscreenElement
        || document.msFullscreenElement);
    }
    function updateFSUI(){
      var full = isFullscreen();
      btnFS.setAttribute('aria-pressed', full ? 'true' : 'false');
      iconEnter.style.display = full ? 'none' : 'block';
      iconExit.style.display = full ? 'block' : 'none';
    }
    async function toggleFullscreen(){
      try{
        if(!isFullscreen()) await enterFullscreen(fsTarget);
        else await exitFullscreen();
      }catch(err){
        console.warn('Fullscreen error:', err);
      }finally{
        updateFSUI();
      }
    }
    document.addEventListener('fullscreenchange', updateFSUI);
    document.addEventListener('webkitfullscreenchange', updateFSUI);
    document.addEventListener('msfullscreenchange', updateFSUI);
    btnFS.addEventListener('click', toggleFullscreen);
    btnFS.addEventListener('keydown', function(e){ if(e.key==='Enter' || e.key===' '){ e.preventDefault(); toggleFullscreen(); } });
    btnZoomIn.addEventListener('click', function(){ userZoom = Math.min(MAX_ZOOM, +(userZoom + ZOOM_STEP).toFixed(2)); scaleStage(); });
    btnZoomOut.addEventListener('click', function(){ userZoom = Math.max(MIN_ZOOM, +(userZoom - ZOOM_STEP).toFixed(2)); scaleStage(); });
  </script>
</body>
</html>
